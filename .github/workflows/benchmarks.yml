name: Benchmarks

on:
  release:
    types: [published]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Run benchmarks
        run: deno bench --unstable-kv --json > benchmark-results.json

      - name: Convert benchmark results
        run: deno run --allow-read benchmarks/utils/convert_bench_results.ts benchmark-results.json > benchmark-results-converted.json

      # On release: store results in gh-pages branch for historical tracking
      # On PRs: compare against stored baseline and comment with performance diff
      - name: Store and compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Benchmark"
          tool: "customSmallerIsBetter"
          output-file-path: benchmark-results-converted.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: "benchmarks-data"
          # Store results on release publish
          auto-push: ${{ github.event_name == 'release' }}
          # Comment on PRs with performance comparison
          comment-on-alert: true
          summary-always: true
          # Alert if any benchmark is 20% slower than baseline
          alert-threshold: "120%"
          # Always comment on PRs with the full comparison
          comment-always: ${{ github.event_name == 'pull_request' }}
          # Do not fail the workflow on performance regressions
          fail-on-alert: false

      # Replace the commit SHA with the release tag in the chart data
      # so x-axis labels show version tags instead of commit hashes
      - name: Label data point with release tag
        if: github.event_name == 'release'
        run: |
          # Resolve SHAs before switching to gh-pages worktree
          RELEASE_SHA="${{ github.sha }}"
          TAG_SHA="$(git rev-list -n 1 "${{ github.event.release.tag_name }}" 2>/dev/null || echo "")"

          git fetch origin gh-pages
          git worktree add gh-pages-dir gh-pages
          cd gh-pages-dir

          sed -i "s|\"id\":\"${RELEASE_SHA}\"|\"id\":\"${{ github.event.release.tag_name }}\"|g" benchmarks-data/data.js
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$RELEASE_SHA" ]; then
            sed -i "s|\"id\":\"${TAG_SHA}\"|\"id\":\"${{ github.event.release.tag_name }}\"|g" benchmarks-data/data.js
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks-data/data.js
          if git diff --cached --quiet; then
            echo "No changes to commit — SHA may not have matched"
          else
            git commit -m "Label benchmark with ${{ github.event.release.tag_name }}"
            git push origin gh-pages
          fi
